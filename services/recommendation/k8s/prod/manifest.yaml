apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation
  namespace: prod
  labels:
    app: recommendation
spec:
  replicas: 3
  selector:
    matchLabels:
      app: recommendation
  template:
    metadata:
      labels:
        app: recommendation
    spec:
      containers:
        - name: recommendation
          image: ghcr.io/shaversj/craftista/recommendation:latest
          ports:
            - containerPort: 8082
          resources:
            requests:
              cpu: 250m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation
  namespace: prod
  labels:
    app: recommendation
spec:
  selector:
    app: recommendation
  ports:
    - port: 8082
      targetPort: 8082
