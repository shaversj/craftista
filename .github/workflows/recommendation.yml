name: Build and Push Recommendation Service

on:
  push:
    branches:
      - main
    paths:
      - 'recommendation/**'
      - '.github/workflows/recommendation.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'recommendation/**'
      - '.github/workflows/recommendation.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/recommendation

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./recommendation
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in values.yaml
        if: github.event_name != 'pull_request'
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          sed -i "s|tag:.*|tag: sha-${SHORT_SHA}|" recommendation/helm/values.yaml
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add recommendation/helm/values.yaml
          git commit -m "Update recommendation image tag to sha-${SHORT_SHA}"
          git push
