apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: prod
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/shaversj/craftista
        revision: HEAD
        directories:
          - path: envs/prod/*
  template:
    metadata:
      name: '{{index .path.segments 2}}-prod'
    spec:
      project: default
      source:
        repoURL: https://github.com/shaversj/craftista
        targetRevision: HEAD
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: prod
      syncPolicy:
        syncOptions:
          - CreateNamespace=true
